name: CD iOS - ReproBatch - Ejemplo_Maui_ReproBatch

on:
  
  push:
    branches: 
      - main

    paths:
      - 'Ejemplo_Maui_Safari_Test/ReproBatch/Ejemplo_Maui_ReproBatch/**'
      - '!**.md'
      - '!**/*.gitignore'
      - '!**/*.gitattributes'

  workflow_call:

env:
  #XCODE_VERSION: '26.3' 
  #XCODE_VERSION_SHORT: '26.3'
  #XCODE_FILE_INSTALLER: 'Xcode_26.3_Universal.xip'
  #XCODE_GOOGLE_FILE_INSTALLER_ID: '1bOvw-C1WBBoTR1mlg1o5t8ZYdjvB95gB'
  
  XCODE_VERSION: '26.0' 
  XCODE_VERSION_SHORT: '26.0'
  XCODE_FILE_INSTALLER: 'Xcode_26_Universal.xip'
  XCODE_GOOGLE_FILE_INSTALLER_ID: '1GoDmCUBOMKM5nnXCXxxnAgoKpSwZvaMP'
  
  #DOTNET_VERSION: '10.0.102'
  DOTNET_VERSION: '10.0.300'
  DOTNET_TARGET_VERSION: 'net10.0'
  DOTNET_VERSION_WORKLOAD: '10.0.100'

  # ─── Datos específicos del proyecto ────────────────────────────────────────── 
  PACKAGE_NAME: 'com.ejemplos.safari.reprobatch'
  SOLUTION_FOLDER: 'Ejemplo_Maui_Safari_Test'
  PROJECTS_ROOT: 'ReproBatch' 
  # PROJECT_FOLDER=${{ env.PROJECTS_ROOT }}/${{ env.PROJECT_NAME }}
  PROJECT_NAME: 'Ejemplo_Maui_ReproBatch'
  PROJECT_FILE: 'Ejemplo_Maui_ReproBatch.csproj'
  # ─────────────────────────────────────────────────────────────────────────────
  
  RUNTIME_IDENTIFIER_SIMULATOR: 'iossimulator-arm64' 
  BUILD_CONFIG_SIMULATOR: 'Release'
  DEVICE_SIMULATOR: 'iPhone 17 Pro Max'

  DOTNET_WORKLOAD_INSTALL_ADDITIONAL_ARGS: --ios-simulator-runtime=26.0
  MD_APPLE_SDK_ROOT: /Applications/Xcode_26.0.app

jobs:
  publish-ios:
    runs-on: macos-15
    name: iOS Publish - GPS - Ejemplo_Maui_GPS

    steps:
    - name: Verificar arquitectura del runner (la mv) 
      run: |
        echo "Arquitectura: $(uname -m)"
        echo "CPU: $(sysctl -n machdep.cpu.brand_string)"
        echo "Model hardware: $(sysctl -n hw.model)"
        echo "Cores numbers: $(sysctl -n hw.ncpu)"

    - name: Checkout the code
      uses: actions/checkout@v4
      with:
        path: ./

    - name: Info del workspace
      run: |
        echo "Current workspace: ${{ github.workspace }}"
        # Current workspace: /Users/runner/work/Ejemplos_Maui_Devices/Ejemplos_Maui_Devices
        
        ls -R ${{ github.workspace }}
        # ls -R /Users/runner/work/Ejemplos_Maui_Devices/Ejemplos_Maui_Devices
        # Ejemplos_Devices
        # README.md
        # /Users/runner/work/Ejemplos_Maui_Devices/Ejemplos_Maui_Devices/Ejemplos_Devices:
        #  ...
        # /Users/runner/work/Ejemplos_Maui_Devices/Ejemplos_Maui_Devices/Ejemplos_Devices/QR/Ejemplo_LectorQR_Dialog:
        #  Ejemplo_LectorQR_Dialog.csproj
        #  ...

    # XCODE

    - name: "XCODE: nstalando utilidades para descarga desde google drive gdown"
      run: |
        set -euxo pipefail
        df -h /
        pipx install gdown
        which gdown
            
    - name: "XCODE: Descarga instalador desde google drive"
      run: |
        echo "XCODE_GOOGLE_FILE_ID: ${{ env.XCODE_GOOGLE_FILE_INSTALLER_ID }}"
        FILE_ID="${{ env.XCODE_GOOGLE_FILE_INSTALLER_ID }}"
        echo "FILENAME: ${{ env.XCODE_FILE_INSTALLER }}"               
        gdown ${{ env.XCODE_GOOGLE_FILE_INSTALLER_ID }} -O ${{ env.XCODE_FILE_INSTALLER }}
        ls -lsh ${{ env.XCODE_FILE_INSTALLER }}

    - name: "XCODE. Descomprimir Xcode instalador"
      run: |
        set -euxo pipefail
        xip --expand ${{ env.XCODE_FILE_INSTALLER }}      
        test -d Xcode.app && echo "Xcode expandido OK"
        rm -f ${{ env.XCODE_FILE_INSTALLER }}
        echo "Listando directorios: $(ls -lh)"
        echo "Espacio disponible: $(df -h /)"
        
    - name: "XCODE. Instalar descarga"
      run: |
        set -euxo pipefail
        XCODE_PATH="/Applications/Xcode_${{ env.XCODE_VERSION }}.app"
        echo "Applictions inicial: $(ls -lsh /Applications/)"
        sudo rm -rf /Applications/Xcode*.app
        sudo mv Xcode.app $XCODE_PATH
        sudo ln -s $XCODE_PATH /Applications/Xcode.app
        echo "Seleccionado Xcode"
        sudo xcode-select --switch $XCODE_PATH
        echo "Aceptación de licencia - instala y configura componentes adicionales"
        sudo xcodebuild -runFirstLaunch
        sudo xcodebuild -license accept
        xcodebuild -version
        echo "Applictions: $(ls -lsh /Applications/)"
       
    - name: XCODE. Verificando actual (xcode y xcodebuild)
      run: |
        echo "Applications path: $(ls -l /Applications/)"
        echo "Applications path recursivo: $(ls -l /Applications/Xcode_${{ env.XCODE_VERSION }}.app)"
        echo "Ruta actual XCode: $(xcode-select -p)"
        echo "xcodebuild sdks version: $(xcodebuild -showsdks)"
        echo "xcode build xcode version: $(xcodebuild -version)"
        echo "Applications path recursivo: $(ls -l /Applications/Xcode_${{ env.XCODE_VERSION }}.app/Contents/Developer/Platforms/)"

    - name: XCODE. Verificar las versiones de los simuladores nativos.
      run: |
        xcrun simctl list runtimes

    - name: XCODE. descarga el simulador requerido
      run: |
        sudo xcodebuild -downloadPlatform iOS
        echo "Espacio actual: $(df -Th )"
        
    - name: XCODE. Verificando simulador instalado
      run: |
        echo "run times instalados: $(xcrun simctl list runtimes)"
        echo "simuladores disponibles: $(xcrun simctl list devices)"
        echo "Path sdk runtime: $(xcrun --sdk iphoneos --show-sdk-path)"        
        echo "Buscando actool: $(xcrun -sdk iphonesimulator -find actool)"        
        echo "Test para ${{ env.DEVICE_SIMULATOR }}: "
        xcrun simctl boot "${{ env.DEVICE_SIMULATOR }}"
        echo "carpeta que luego el sdk en el build busca el actool "
        ls /Applications/Xcode_${{ env.XCODE_VERSION_SHORT }}.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/

    # NETCORE

    - name: .NETCORE. Elimina las versiones de net que no se usan
      run: |
        sudo rm -rf /Users/runner/.dotnet
        
    - name: .NETCORE. Descarga e instalación de netcore
      run: |  
        mkdir -p ~/.dotnet

        echo "Descargar e instalar con el script oficial"

        curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
        chmod ugo+x dotnet-install.sh

        echo "Ejecutando Script de Instalación dotnet"
        ./dotnet-install.sh --version ${{ env.DOTNET_VERSION }} --install-dir $HOME/.dotnet

        rm dotnet-install.sh

        echo "Fin script de instalación dotnet"
        sudo chown -R $(whoami):staff ~/.dotnet
        echo "$HOME/.dotnet" >> $GITHUB_PATH
        export PATH="$HOME/.dotnet:$PATH"

        echo "Instalación dotnet which: $(which dotnet)"
        echo "Instalación dotnet version: $(dotnet --version)"
        echo "Instalación dotnet info: $(dotnet --info)"
        dotnet --version || { echo "ERROR: .NET no se instaló correctamente"; exit 1; }
        echo "dotnet root: $(ls -l /Users/runner/.dotnet)"
        
    - name: .NETCORE. Verificar versiones
      run: |
        echo "dotnet version: $(dotnet --version)"
        echo "sdks dotnet version: $(dotnet --list-sdks)"
        echo "Runtimes dotnet version: $(dotnet --list-runtimes)"
        echo "Sdks disponibles: $(ls /Users/runner/.dotnet/sdk)"
    
    # WORKLOADS

    - name: WORKLOADS. Verificar disponibles
      run: |
        echo "Imprime todo lo que tiene: $(dotnet workload search)"
        echo "Imprime los workloads que tenga instalados: $(dotnet workload list)"

    - name: WORKLOADS. Instalar versiones específicas
      run: |
        dotnet workload install ios maui maui-ios --version ${{ env.DOTNET_VERSION_WORKLOAD }}

        # Workload version: 10.0.100
        # Installed Workload Id      Manifest Version         Installation Source
        # -----------------------------------------------------------------------
        # ios                        26.0.11017/10.0.100      SDK 10.0.100       
        # maui                       10.0.0/10.0.100          SDK 10.0.100       
        # maui-ios                   10.0.0/10.0.100          SDK 10.0.100    
      env:
        DOTNET_NOLOGO: true
        DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

    - name: WORKLOADS. Verifica instalados
      run: |
        dotnet workload list --verbosity detailed
         
    # SET PATH PROJECT

    - name: PATH PROJECT AND SOLUTION.
      run: |
        # workspace/Ejemplos_Devices/QR/Ejemplo_LectorQR_Dialog  <- SOLUTION_PATH
        # workspace/Ejemplos_Devices/QR/Ejemplo_LectorQR_Dialog/Ejemplo_LectorQR_Dialog  <- PROJECT_PATH

        echo "....> $(pwd)"
        
        SOLUTION_PATH=${{ github.workspace }}/${{ env.SOLUTION_FOLDER }}
        SOLUTION_PATH=$(realpath "$SOLUTION_PATH")

        PROJECT_PATH=$SOLUTION_PATH/${{ env.PROJECTS_ROOT }}/${{ env.PROJECT_NAME}}
        PROJECT_PATH=$(realpath "$PROJECT_PATH")

        PLIST_PATH=$SOLUTION_PATH/${{ env.PROJECTS_ROOT }}/${{ env.PROJECT_NAME}}/Platforms/iOS/Info.plist
        PLIST_PATH=$(realpath "$PLIST_PATH")
        
        echo "PROJECT_PATH=$PROJECT_PATH" >> $GITHUB_ENV
        echo "SOLUTION_PATH=$SOLUTION_PATH" >> $GITHUB_ENV
        echo "PLIST_PATH=$PLIST_PATH" >> $GITHUB_ENV

        echo "Recursive path: $(ls -lshR $SOLUTION_PATH)"

    # VERSIONADO BUNDLE

    - name: VERSIONADO. PROFILE. Versionado del bundle desde la version del app
      run: |  
        PLIST_PATH=${{ env.PROJECT_PATH }}/Platforms/iOS/Info.plist
                
        BUNDLE_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleVersion" $PLIST_PATH)
        echo "Versión visible para los usuarios:"$BUNDLE_VERSION

        SHORT_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" $PLIST_PATH)
        echo "Versionado de compilacion:"$SHORT_VERSION
        
        APP_VERSION_BUILD="${SHORT_VERSION}_${BUNDLE_VERSION}"
        echo "APP_VERSION_BUILD=$APP_VERSION_BUILD" >> $GITHUB_ENV

    - name: VERSIONADO. FECHA
      run: |
        VERSION_FECHA=$(date +"%Y%m%d%H%M")
        echo "version fecha: $VERSION_FECHA"
        echo "VERSION_FECHA=$VERSION_FECHA" >> $GITHUB_ENV

    # MANIFEST

    - name: MANIFEST. Validar manifests iOS
      run: |
        echo "Validando plists"
        plutil -lint "${{ env.PROJECT_PATH }}/Platforms/iOS/Info.plist" || { echo "ERROR: Info.plist inválido"; exit 1; }      
        echo "Todos los plists válidos"
       
    # BUILD SIMULADOR

    - name: BUILD SIMULADOR. Limpiar proyecto
      run: |
        cd ${{ env.SOLUTION_PATH }}
        # cd /Users/runner/work/Ejemplos_Maui_Devices/Ejemplos_Maui_Devices/Ejemplos_Devices
        #dotnet clean "${{ env.PROJECT_FOLDER }}/${{ env.PROJECT_FILE }}" -f ${{ env.DOTNET_TARGET_VERSION }}-ios
        dotnet clean "${{ env.PROJECTS_ROOT }}/${{ env.PROJECT_NAME}}/${{ env.PROJECT_FILE }}" -f ${{ env.DOTNET_TARGET_VERSION }}-ios
        # dotnet clean Ejemplo_LectorQR_Dialog.csproj -f net10.0-ios

    - name: PRE-BUILD. Generar ApiKeys.cs desde secreto
      run: |
        APIKEYS_PATH=${{ env.PROJECT_PATH }}/Services/ApiKeys.cs
        cat "$APIKEYS_PATH.template" \
          | sed 's/REEMPLAZAR_CON_TU_API_KEY/${{ secrets.GOOGLE_MAPS_API_KEY }}/' \
          > "$APIKEYS_PATH"
        echo "ApiKeys.cs generado en: $APIKEYS_PATH"

    - name: BUILD SIMULADOR. Restaurar dependencias
      run: |
        cd ${{ env.SOLUTION_PATH }}
        #dotnet restore  "${{ env.PROJECT_FOLDER }}/${{ env.PROJECT_FILE }}" \
        dotnet restore "${{ env.PROJECTS_ROOT }}/${{ env.PROJECT_NAME }}/${{ env.PROJECT_FILE }}" \
          -p:TargetFramework=${{ env.DOTNET_TARGET_VERSION }}-ios \
          -p:RuntimeIdentifier=${{ env.RUNTIME_IDENTIFIER_SIMULATOR }}
          
    - name: BUILD SIMULADOR. Construye para el simulador iOS
      env:
        MD_APPLE_SDK_ROOT: /Applications/Xcode_${{ env.XCODE_VERSION_SHORT }}.app
        XCODE_DEVELOPER_DIR_PATH: /Applications/Xcode_${{ env.XCODE_VERSION_SHORT }}.app/Contents/Developer   
      run: |
        cd ${{ env.SOLUTION_PATH }}

        echo "Proyecto: ${{ env.PROJECT_FILE }}"
        echo "Build: ${{ env.BUILD_CONFIG_SIMULATOR }}"
        echo "Target framework: ${{ env.DOTNET_TARGET_VERSION }}-ios"

        #dotnet build "${{ env.PROJECT_FOLDER }}/${{ env.PROJECT_FILE }}" \
        dotnet build "${{ env.PROJECTS_ROOT }}/${{ env.PROJECT_NAME }}/${{ env.PROJECT_FILE }}" \
            -c ${{ env.BUILD_CONFIG_SIMULATOR }} \
            -f:${{ env.DOTNET_TARGET_VERSION }}-ios \
            -p:RuntimeIdentifier=${{ env.RUNTIME_IDENTIFIER_SIMULATOR }} \
            -p:LinkMode=SdkOnly \
            -p:CLI_Build=true \
            -p:CodesignEntitlements=Platforms/iOS/Entitlements.Development.plist \
            -p:EnableCodeSigning=false \
            -p:CodesignProvision="" \
            -p:CodesignKey="-" \
            -v normal

        echo "Imprime la carpeta bin recursiva:"
        #ls -Rl "${{ env.PROJECT_FOLDER }}/bin/"
        ls -Rl "${{ env.PROJECTS_ROOT }}/${{ env.PROJECT_NAME }}/bin/"
        
        
        BASE_PATH=${{ env.PROJECT_PATH }}/bin/${{ env.BUILD_CONFIG_SIMULATOR }}/${{ env.DOTNET_TARGET_VERSION }}-ios/${{ env.RUNTIME_IDENTIFIER_SIMULATOR }}
        #APP_PATH=${BASE_PATH}/${{ env.PROJECT_FOLDER }}.app
        APP_PATH=${BASE_PATH}/${{ env.PROJECT_NAME }}.app
        APP_PATH=$(realpath "$APP_PATH")

        echo "BASE_PATH: $BASE_PATH"      
        echo "APP_PATH: $APP_PATH"

        echo "BASE_PATH=$BASE_PATH" >> $GITHUB_ENV
        echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
           
    # BUILD SIMULADOR

    - name: BUILD SIMULADOR. Firma robusta 
      run: |
        
        #APP_FOLDER="${{ env.PROJECT_FOLDER }}.app" 
        #APP_FOLDER="${{ env.PROJECTS_ROOT }}/${{ env.PROJECT_NAME }}.app"
        #ENTITLEMENTS_PATH="${{ env.PROJECT_FOLDER }}/${{ env.PROJECT_FILE }}/Platforms/iOS/Entitlements.Development.plist"
        #ENTITLEMENTS_PATH="${{ env.PROJECTS_ROOT }}/${{ env.PROJECT_NAME }}/Platforms/iOS/Entitlements.Development.plist"

        echo "pwd: $(pwd)";
        echo "ls recursivo: $(ls -lsR)";

        cd ${{ env.SOLUTION_PATH }}
        ENTITLEMENTS_PATH="${{ env.PROJECTS_ROOT }}/${{ env.PROJECT_NAME }}/Platforms/iOS/Entitlements.Development.plist"
       
    
        echo "Limpiando firmas previas y atributos corruptos..."
        xattr -cr "${{ env.APP_PATH }}"
        rm -rf "${{ env.APP_PATH }}/_CodeSignature"
        #chmod +x "${{ env.APP_PATH }}/${{ env.PROJECT_FOLDER }}"
        chmod +x "${{ env.APP_PATH }}/${{ env.PROJECT_NAME }}"

        echo "Firmando contenido interno (DLLs y AOT) uno por uno..."
        find "${{ env.APP_PATH }}" -name "*.dll" -or -name "*.dylib" -or -name "*.aotdata*" | xargs codesign --force --sign "-" --timestamp=none
        
        echo "Firmando el binario principal con los Entitlements..."
        #codesign --force --sign "-" --timestamp=none --entitlements "$ENTITLEMENTS_PATH" "${{ env.APP_PATH }}/${{ env.PROJECT_FOLDER }}"
        codesign --force --sign "-" --timestamp=none --entitlements "$ENTITLEMENTS_PATH" "${{ env.APP_PATH }}/${{ env.PROJECT_NAME }}"
        
        echo "Sellado final del paquete (Bundle)..."
        codesign --force --sign "-" --timestamp=none "${{ env.APP_PATH }}"
        
        echo "Verificando identidad"
        codesign -vv -d "${{ env.APP_PATH }}"

        cd ${{ env.SOLUTION_PATH }}

    - name: BUILD SIMULADOR. Test entitlements
      run: |  
        #file "${{ env.APP_PATH }}/${{ env.PROJECT_FOLDER }}"
        file "${{ env.APP_PATH }}/${{ env.PROJECT_NAME }}"

        /usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "${{ env.APP_PATH }}/Info.plist"
        #codesign -d --entitlements :- "${{ env.APP_PATH }}/${{ env.PROJECT_FOLDER }}"
        codesign -d --entitlements :- "${{ env.APP_PATH }}/${{ env.PROJECT_NAME }}"
        
    # PUBLISH SIMULADOR

    - name: BUILD RELEASE SIMULADOR. Zip del .app
      run: |  
        echo "APP_PATH: ${{ env.APP_PATH }}"

        ZIP_NAME="${{ env.VERSION_FECHA }}_${{ env.APP_VERSION_BUILD }}_${{ env.PACKAGE_NAME }}.app.zip"
        echo "ZIP NAME: $ZIP_NAME"

        cd "${{ env.BASE_PATH }}"
        zip -ry "$ZIP_NAME" "${{ env.PROJECT_NAME }}.app"
                        
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        echo "ZIP_PATH=${{ env.BASE_PATH }}/$ZIP_NAME" >> $GITHUB_ENV    
        
    - name: RELEASE SIMULADOR. Subir appName.app.zip como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        path: |          
          ${{ env.ZIP_PATH}}
        retention-days: 1

     # RUN SIMULADOR

    - name: Install ffmpeg
      run: |    
        brew install ffmpeg  
    
    - name: RELEASE SIMULADOR. GRABAR VIDEO Y CREAR GIF
      continue-on-error: true
      timeout-minutes: 30
      run: |
        echo "Esperando algo como (Signature=adhoc): "
        codesign -vvv --display "${APP_PATH}"
        cd "${{ github.workspace }}"
        chmod ugo+rwx ./Utilities/simular.sh
        ./Utilities/simular.sh

    - name: RELEASE SIMULADOR. Subir GIF de evidencia  
      uses: actions/upload-artifact@v4
      with:
        name: grabacion-simulador
        path: | 
          evidencia_app.gif
          frames/
          debug_logs/
          debug_logs/launch_output.txt
          app_stream_full.txt
          /tmp/app_stderr.txt
        if-no-files-found: warn
        retention-days: 1

    - name: Clean up keychain and provisioning profile
      if: ${{ always() }}
      run: |
        echo "Limpieza de keychain y perfiles de aprovisionamiento"